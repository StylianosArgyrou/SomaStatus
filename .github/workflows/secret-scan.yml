name: Secret Scan

# Fails on any committed secret. Runs the gitleaks binary directly from its
# container image (no license gate — the GITLEAKS_LICENSE requirement only
# applies to the GitHub Action wrapper on org accounts). Scans full git history
# on every PR, main push, and weekly on a schedule.

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC — full-history sweep
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # `detect` scans the full commit history mounted at /repo and exits 1 on
        # any finding. Add a repo-root `.gitleaks.toml` allowlist for confirmed
        # false positives rather than disabling the job.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --redact --verbose --exit-code=1
